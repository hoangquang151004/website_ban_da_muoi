<!DOCTYPE html>
<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Đăng nhập &amp; Đăng ký Đèn đá muối</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#f28c28",
                        "warm-cream": "#FDFBF7",
                        "charcoal": "#333333",
                        "soft-gray": "#F5F5F5",
                        "border-subtle": "#E5E5E5"
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="font-display bg-gray-100 text-charcoal min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
<div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1513506003013-68d27dbe9711?q=80&amp;w=2574&amp;auto=format&amp;fit=crop')] bg-cover bg-center opacity-30 blur-sm" data-alt="blurred warm cozy bedroom background"></div>
<div class="absolute inset-0 bg-white/40 backdrop-blur-sm"></div>
<div class="relative w-full max-w-[1000px] bg-warm-cream rounded-2xl shadow-2xl flex flex-col md:flex-row overflow-hidden border border-white/50">
<div class="hidden md:block w-1/2 relative">
<div class="absolute inset-0 bg-cover bg-center h-full w-full" data-alt="glowing himalayan salt lamp in cozy room" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuA5tnmHT7QfJVKumqLXk9EL7nedF5hMboSyNv6zX1vZs3tJIQMJ6dt5RPH0PiSo7DPGOqRkVPCUGvKBymF_jEbwyA0AsWA4c6IMAx6Or6M4H3cQw7XR83xomKxsMv1gRm3RTQ9wEegfcjXp7KeERQOtEca-8mtc13X1MUy4DBTdDE556NNVBfhkuWWAMrGgGvK55sKeAIa0it8hEab9qdvaVHy-gcIvo5BdYzWXMZkou1ltNOCkCa7SqoYCw3SaajFjGmbHNzHvPg9o');">
<div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent"></div>
<div class="absolute bottom-8 left-8 right-8 text-white">
<h3 class="text-2xl font-bold mb-2">Không gian thư giãn</h3>
<p class="text-slate-100 text-sm">Mang sự ấm áp và bình yên từ thiên nhiên vào ngôi nhà của bạn.</p>
</div>
</div>
</div>
<div class="w-full md:w-1/2 p-8 lg:p-12 flex flex-col justify-center bg-warm-cream">
<div class="mb-8 text-center md:text-left">
<h2 class="text-3xl font-bold text-charcoal mb-2">Chào mừng trở lại</h2>
<p class="text-gray-500">Đăng nhập để tiếp tục mua sắm</p>
</div>
<form class="space-y-5">
<div>
<label class="block text-sm font-medium text-charcoal mb-2" for="email">Email</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
<span class="material-symbols-outlined text-[20px]">mail</span>
</span>
<input class="form-input block w-full pl-10 pr-3 py-3 rounded-lg border-border-subtle bg-white text-charcoal placeholder-gray-400 focus:border-primary focus:ring-primary sm:text-sm shadow-sm transition-colors duration-200" id="email" placeholder="nhập email của bạn" type="email"/>
</div>
</div>
<div>
<div class="flex justify-between items-center mb-2">
<label class="block text-sm font-medium text-charcoal" for="password">Mật khẩu</label>
<a class="text-sm font-medium text-primary hover:text-primary/80 transition-colors" href="#">Quên mật khẩu?</a>
</div>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
<span class="material-symbols-outlined text-[20px]">lock</span>
</span>
<input class="form-input block w-full pl-10 pr-3 py-3 rounded-lg border-border-subtle bg-white text-charcoal placeholder-gray-400 focus:border-primary focus:ring-primary sm:text-sm shadow-sm transition-colors duration-200" id="password" placeholder="nhập mật khẩu của bạn" type="password"/>
</div>
</div>
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-white bg-primary hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all duration-200 transform hover:scale-[1.01]" type="button">
                    Đăng nhập
                </button>
</form>
<div class="mt-8">
<div class="relative">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-gray-200"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-2 bg-warm-cream text-gray-500">Hoặc tiếp tục với</span>
</div>
</div>
<div class="mt-6 grid grid-cols-2 gap-3">
<button class="w-full inline-flex justify-center items-center py-2.5 px-4 border border-gray-200 rounded-lg shadow-sm bg-white text-sm font-medium text-charcoal hover:bg-gray-50 transition-colors duration-200" type="button">
<svg class="mr-2" height="20" viewBox="0 0 48 48" width="20">
<path d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" fill="#EA4335"></path>
<path d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" fill="#4285F4"></path>
<path d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" fill="#FBBC05"></path>
<path d="M24 48c6.48 0 12.23-2.16 16.58-5.88l-7.73-6c-2.15 1.45-4.92 2.3-8.85 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" fill="#34A853"></path>
</svg>
                        Google
                    </button>
<button class="w-full inline-flex justify-center items-center py-2.5 px-4 border border-gray-200 rounded-lg shadow-sm bg-white text-sm font-medium text-charcoal hover:bg-gray-50 transition-colors duration-200" type="button">
<svg aria-hidden="true" class="h-5 w-5 mr-2 text-[#1877F2]" fill="currentColor" viewBox="0 0 24 24">
<path clip-rule="evenodd" d="M22 12c0-5.523-4.477-10-10-10S2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.878v-6.987h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.988C18.343 21.128 22 16.991 22 12z" fill-rule="evenodd"></path>
</svg>
                        Facebook
                    </button>
</div>
</div>
<div class="mt-8 text-center">
<p class="text-sm text-gray-600">
                    Chưa có tài khoản? 
                    <a class="font-bold text-primary hover:text-primary/80 transition-colors" href="#">Đăng ký ngay</a>
</p>
</div>
</div>
</div>

</body></html>
